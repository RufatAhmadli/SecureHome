spring:
  datasource:
    url: ${JDBC_URL}
    password: ${JDBC_PASSWORD}
    username: ${JDBC_USERNAME}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

mqtt:
  broker:
    url: tcp://localhost:1883
  client:
    id: securehome-backend
  topic:
    subscribe: home/#

jwt:
  secret: ${SECRET_KEY}
  expiration: ${EXPIRATION_TIME}
logging:
  level:
    liquibase: DEBUG
    root: INFO